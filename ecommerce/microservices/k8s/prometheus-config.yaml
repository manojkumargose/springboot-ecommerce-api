apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  namespace: ecommerce
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'microservices'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['core-service:8082', 'ai-pricing-service:8083']