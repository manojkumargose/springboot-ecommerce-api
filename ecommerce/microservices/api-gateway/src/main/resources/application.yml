server:
  port: 8084

spring:
  application:
    name: api-gateway
  profiles:
    active: local
  cloud:
    gateway:

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # --- AUTH (monolith) ---
        - id: auth-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/auth/**

        # --- PRODUCTS (monolith) ---
        - id: product-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/products/**

        # --- CART (monolith) ---
        - id: cart-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/cart/**

        # --- ORDERS (monolith) ---
        - id: order-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/orders/**

        # --- WISHLIST (monolith) ---
        - id: wishlist-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/wishlist/**

        # --- COUPONS (monolith) ---
        - id: coupon-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/coupons/**

        # --- REVIEWS (monolith) ---
        - id: review-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/reviews/**

        # --- ADDRESSES (monolith) ---
        - id: address-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/addresses/**

        # --- PAYMENTS (monolith) ---
        - id: payment-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/v1/payments/**

        # --- AI PRICING (microservice) ---
        - id: pricing-service
          uri: lb://ai-pricing-service
          predicates:
            - Path=/api/pricing/**

        # --- AI RECOMMENDATIONS (microservice) ---
        - id: recommendation-service
          uri: lb://ai-pricing-service
          predicates:
            - Path=/api/recommendations/**

        # --- AI DASHBOARD (microservice) ---
        - id: dashboard-service
          uri: lb://ai-pricing-service
          predicates:
            - Path=/api/dashboard/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    config:
      enabled: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true