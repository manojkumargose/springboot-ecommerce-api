apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-db
  namespace: ecommerce
  labels:
    app: core-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-db
  template:
    metadata:
      labels:
        app: core-db
    spec:
      containers:
        - name: core-db
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              value: "core_db"
          ports:
            - containerPort: 3306
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: core-db-storage
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: core-db-storage
          persistentVolumeClaim:
            claimName: core-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: core-db-pvc
  namespace: ecommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: core-db
  namespace: ecommerce
spec:
  selector:
    app: core-db
  ports:
    - port: 3306
      targetPort: 3306