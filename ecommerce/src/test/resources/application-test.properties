# Test configuration - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Eureka for tests
eureka.client.enabled=false

# Disable RabbitMQ for tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Disable Redis for tests
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# JWT config for tests
jwt.secret=mySecretKeyForJWTAuthThatIsAtLeast32CharsLong
jwt.expiration=86400000

# Cloudinary disabled for tests
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

# Mail disabled for tests
spring.mail.host=localhost
spring.mail.port=25
spring.autoconfigure.exclude[1]=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration