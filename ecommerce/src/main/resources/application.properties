# ==============================================================
# SERVER CONFIGURATION
# ==============================================================
server.port=8080

# ==============================================================
# MYSQL DATABASE (Docker - Port 3308)
# ==============================================================
# Fixed the SSL property and removed the trailing dots that caused the crash
spring.datasource.url=jdbc:mysql://localhost:3308/core_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ==============================================================
# RABBITMQ (Docker - Port 5672)
# ==============================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ==============================================================
# REDIS CACHE
# ==============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==============================================================
# SECURITY (JWT)
# ==============================================================
jwt.secret=mySecretKeyForJWTAuthThatIsAtLeast32CharsLong
jwt.expiration=86400000

# ==============================================================
# EMAIL SERVICE (Gmail SMTP)
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=manojkumarprince01@gmail.com
spring.mail.password=your-app-password-here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==============================================================
# CLOUDINARY (Image Hosting)
# ==============================================================
cloudinary.cloud.name=damzybrys
cloudinary.api.key=736279585883567
